ARMADA_DEVICE_ID=retroid-pocket-5
ARMADA_DEVICE_NAME='Retroid Pocket 5'
ARMADA_SOC_CLASS=SM8250

# WORK IN PROGRESS - no Retroid Pocket 5 hardware to test any of this
# against yet (ported from ROCKNIX's kernel/dts/sm8250-retroidpocket-rp5.dts,
# see armada-packages). Everything below is a first guess, not a live-tested
# value like Retroid Pocket Mini V2's - expect to have to correct some of
# this once real hardware/testers are available.
ARMADA_PRIMARY_CONNECTOR=DSI-1

# This DTS sets a kernel-level `rotation = <270>` on the panel node itself,
# which was assumed to be enough on its own - confirmed WRONG by community
# testing: desktop mode renders correctly, but Steam Big Picture/gamescope
# comes up in portrait regardless, meaning gamescope doesn't pick up the
# kernel-level panel rotation the way the desktop Wayland compositor does.
# Needs the same userspace rotation shader Mini V2 uses. Two data points from
# Flip2 (identical panel/DTS rotation setup to this device) pin the direction:
# `normal` + shader gave a 90-degree-clockwise-rotated output; switching to
# `right` (assuming it would match Mini V2's own live-verified value) instead
# gave upside-down (180 degrees) - i.e. `right` ADDED another 90 degrees in
# the same direction rather than cancelling the panel's built-in offset, so
# Mini V2's correct value doesn't transfer here. `left` is the next value to
# try - it should cancel the same offset `normal` has instead of compounding
# it. Still unconfirmed on real RP5 hardware specifically (only Flip2 has
# been live-tested at any of these three values).
ARMADA_PANEL_ORIENTATION=left
ARMADA_PANEL_NATIVE_WIDTH=1080
ARMADA_PANEL_NATIVE_HEIGHT=1920
ARMADA_PANEL_REFRESH_RATES=60
ARMADA_GAMESCOPE_USE_ROTATION_SHADER=1

# UNVERIFIED ESTIMATE, not a spec-sheet value: computed by assuming the same
# pixel density as Mini V2's known-correct 65x75mm/1080x1240 panel, scaled up
# to this panel's 1080x1920. No official physical-size figure was available
# to check this against. Getting this wrong inflates Steam's AutoScaleFactor
# the same way it did for Mini V2 before that was root-caused - verify
# against a real spec sheet or measurement before trusting it.
ARMADA_GAMESCOPE_FAKE_OUTPUT_MM=65x116

# Real suspend (s2idle) instead of fake-suspend, matching Mini V2 - fake-
# suspend never actually power-gates the SoC (just freezes userspace and
# blanks the screen), so the power button could never produce a "full"
# sleep under it. The wifi-reconnect and power-key-rebound fixes for real
# suspend (see 50-armada-real-suspend) have been live-tested repeatedly on
# Mini V2 this cycle, but NOT on real RP5 hardware specifically - same
# SM8250 family and kernel, so expected to behave the same, but unconfirmed.
# Watchdog set as a safety net for that reason.
ARMADA_SUSPEND_MODE=mem
ARMADA_SUSPEND_WATCHDOG_MINUTES=10
