ARMADA_DEVICE_ID=retroid-pocket-mini-v2
ARMADA_DEVICE_NAME='Retroid Pocket Mini V2'
ARMADA_SOC_CLASS=SM8250

ARMADA_PRIMARY_CONNECTOR=DSI-1
ARMADA_PANEL_ORIENTATION=right
ARMADA_PANEL_NATIVE_WIDTH=1080
ARMADA_PANEL_NATIVE_HEIGHT=1240
ARMADA_PANEL_REFRESH_RATES=60
ARMADA_GAMESCOPE_USE_ROTATION_SHADER=1
# 3.92" diagonal (Retroid spec) at 1080x1240 native (portrait). gamescope's
# GAMESCOPE_FAKE_OUTPUT_MM feeds wl_output phys_width/phys_height directly in
# place of the DRM connector's mmWidth/mmHeight (see armada-packages'
# 0004-DRMBackend patch) - i.e. native/pre-rotation orientation, matching
# ARMADA_PANEL_NATIVE_WIDTH/HEIGHT above, NOT the post-rotation landscape
# view. Width(1080px)=65mm, height(1240px)=75mm. Getting this backwards is
# what made Steam's AutoScaleFactor come out ~2x too large on first launch.
ARMADA_GAMESCOPE_FAKE_OUTPUT_MM=65x75

# fake-suspend never actually powers the SoC down - it just freezes
# userspace and blanks the screen, which is why the button never produced a
# "full" sleep. Real suspend (s2idle) has been live-tested repeatedly on
# this exact device this cycle: the wifi-reconnect fix (rfkill block/unblock
# around sleep, see 50-armada-real-suspend) reassociated in 1-9s across
# every retest, and the power-key rebound guard in powerbuttond covers the
# wake-press-read-as-a-new-press race. Watchdog set as a safety net (not 0)
# since this is the first default rollout of real suspend for an SM8250
# device - if a wake genuinely fails to register, the device recovers on
# its own instead of staying asleep indefinitely.
ARMADA_SUSPEND_MODE=mem
ARMADA_SUSPEND_WATCHDOG_MINUTES=10
