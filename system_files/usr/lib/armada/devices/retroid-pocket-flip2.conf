ARMADA_DEVICE_ID=retroid-pocket-flip2
ARMADA_DEVICE_NAME='Retroid Pocket Flip2'
ARMADA_SOC_CLASS=SM8250

# WORK IN PROGRESS - no hardware to test against yet. Flip2's device tree
# (kernel/dts/sm8250-retroidpocket-flip2.dts, see armada-packages) just
# extends Retroid Pocket 5's with a hall-sensor lid switch, so the panel is
# the same and these values are copied from retroid-pocket-5.conf - see that
# file's comments for why each one is an unverified first guess rather than
# a live-tested value.
ARMADA_PRIMARY_CONNECTOR=DSI-1
# Community testing on this exact device found the output rotated 90
# degrees clockwise with orientation=normal (shader enabled). Switching to
# `right` (assuming it would match Mini V2's own live-verified value) was
# tried next but made it worse - upside down (180 degrees) - meaning
# `right` added another 90-degree rotation in the same direction instead of
# cancelling the panel's built-in offset. `left` should cancel it instead:
# normal's +90 plus left's -90 nets to zero. See retroid-pocket-5.conf's
# comment for the fuller story - still needs live confirmation.
ARMADA_PANEL_ORIENTATION=left
ARMADA_PANEL_NATIVE_WIDTH=1080
ARMADA_PANEL_NATIVE_HEIGHT=1920
ARMADA_PANEL_REFRESH_RATES=60
ARMADA_GAMESCOPE_USE_ROTATION_SHADER=1
ARMADA_GAMESCOPE_FAKE_OUTPUT_MM=65x116

# The hall-sensor lid switch itself needs no device-specific wiring here -
# armada's input-lib (armada_dev_has_lid/armada_find_lid_dev) already detects
# any input device exposing SW_LID generically, which is exactly what the
# DTS's gpio-keys-lid node exposes.

# Real suspend (s2idle) instead of fake-suspend, matching Mini V2/RP5 - fake-
# suspend never actually power-gates the SoC, so the power button could
# never produce a "full" sleep under it. Unconfirmed on real Flip2 hardware
# specifically (same SM8250 family/kernel as Mini V2, where the underlying
# wifi-reconnect and power-key-rebound fixes were live-tested repeatedly
# this cycle). Flip2's hall-sensor lid GPIO is also marked wakeup-source in
# its DTS - under fake-suspend that never mattered (the kernel never
# actually suspends), but under real suspend a lid-open should now wake the
# device via that IRQ same as the power key; unverified whether it actually
# does on this hardware. Watchdog set as a safety net either way.
ARMADA_SUSPEND_MODE=mem
ARMADA_SUSPEND_WATCHDOG_MINUTES=10
