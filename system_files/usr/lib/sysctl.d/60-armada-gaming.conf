kernel.nmi_watchdog=0
kernel.soft_watchdog=0
kernel.watchdog=0

vm.swappiness=180
vm.watermark_boost_factor=0
vm.watermark_scale_factor=125
vm.dirty_bytes=268435456
vm.dirty_background_bytes=67108864
vm.dirty_writeback_centisecs=1500
vm.page-cluster=0
vm.max_map_count=2147483642

fs.inotify.max_user_watches=524288

# Disable the RT throttle: armada-gamescope-rt promotes gamescope's compositor
# threads to SCHED_RR, and the kernel's default 95%-per-period RT cap would
# throttle them under load - stalling the compositor, the exact symptom the
# promotion exists to avoid. No rtprio grant exists for the armada user
# (see limits.d/60-armada-gaming.conf), so this doesn't open up arbitrary
# RT abuse from unprivileged processes.
kernel.sched_rt_runtime_us=-1
