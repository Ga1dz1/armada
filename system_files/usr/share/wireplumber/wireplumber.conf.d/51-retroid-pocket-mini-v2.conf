# WirePlumber drop-in for Retroid Pocket Mini / Mini V2 (SM8250).
#
# The Qualcomm qdsp6 routing path on SM8250 opens its ADM "COPP" with
# NULL_COPP_TOPOLOGY -- a bit-exact passthrough that performs no sample-format
# conversion. Without the kernel's 0100-revert-force-16bit-audio.patch this is
# hard-required for every stream; with it, only compressed streams are forced
# S16_LE at the kernel level, but forcing it here too is harmless and matches
# what ROCKNIX ships alongside the same kernel patch.
#
# Card name confirmed via `wpctl inspect <alsa device id>` on real hardware
# (armada-sm8250-handoff SSH session, 2026-07-17): alsa.card_name is
# "RetroidPocket" - not the DT model string or a slugified guess.
monitor.alsa.rules = [
  {
    matches = [
      { alsa.card_name = "RetroidPocket" }
    ]
    actions = {
      update-props = {
        audio.format = "S16LE"
      }
    }
  }
]
