# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CompositeDevice

# Name of the composite device mapping
name: Retroid Layout (Flip2)

# Split out from 01-retroid-controller.yaml: same serial-MCU gamepad as
# Mini V2/RP5 (phys "retroid-pocket-gamepad/input0", identical raw button
# codes - confirmed unchanged in shuuri-labs/pocknix-os's own Flip2 capability
# map, which maps BTN_START/BTN_SELECT the same way we do).
#
# Briefly set to target `deck` (2026-07-23) to chase a community report of
# Select acting as Start on real Flip2 hardware, following pocknix-os's own
# choice of `deck` over `deck-uhid` for this family. That broke worse: `deck`
# emulates a real USB device over the kernel's vhci_hcd (USB/IP) host
# controller, and this kernel's config has no CONFIG_USBIP_CORE/
# CONFIG_USBIP_VHCI_HCD at all (confirmed against both the arm64 defconfig
# armada-packages/kernel builds from and our own config override fragment -
# neither enables it), so InputPlumber could never actually create the
# target device and the gamepad disappeared entirely in Gaming Mode. Back on
# deck-uhid, same as every other device: no vhci_hcd dependency, and the
# Select/Start swap is a real but lesser bug to chase separately (likely a
# capability-map-level fix, not a target-type swap).
matches:
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Retroid Pocket Flip2

# Only allow a single source device per composite device of this type.
single_source: false

# One or more source devices to combine into a single virtual device. The events
# from these devices will be watched and translated according to the key map.
source_devices:
  - group: gamepad
    evdev:
      phys_path: retroid-pocket-gamepad/input0
      handler: event*
    capability_map_id: retroid_mcu
    # See 01-retroid-controller.yaml's own comment on passthrough - same
    # reason (armada-stick-led's reactive LED mode needs the raw node too).
    passthrough: true

# Optional configuration for the composite device
options:
  auto_manage: true

target_devices:
  - deck-uhid
  - keyboard
