# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CompositeDevice

# Name of the composite device mapping
name: Retroid Layout (Flip2)

# Split out from 01-retroid-controller.yaml: same serial-MCU gamepad as
# Mini V2/RP5 (phys "retroid-pocket-gamepad/input0", identical raw button
# codes - confirmed unchanged in shuuri-labs/pocknix-os's own Flip2 capability
# map, which maps BTN_START/BTN_SELECT the same way we do).
#
# Briefly set to target `deck` (2026-07-23) to chase a community report of
# Select acting as Start on real Flip2 hardware, on the assumption (wrong -
# pocknix-os's actual repo has no Flip2 support at all, verified via GitHub
# code search after the fact) that pocknix-os used `deck` across the family.
# `deck` emulates a real USB device over the kernel's vhci_hcd (USB/IP) host
# controller, and this kernel's config has no CONFIG_USBIP_CORE/
# CONFIG_USBIP_VHCI_HCD at all, so InputPlumber could never create the
# target device and the gamepad disappeared entirely in Gaming Mode.
#
# ROCKNIX (also InputPlumber-based, verified live on GitHub - identical
# retroid_mcu.yaml, same BTN_START/BTN_SELECT mapping we use) sidesteps this
# whole class of bug by never using deck-uhid for the Retroid family at all:
# their 01-retroid-controller.yaml targets `ds5` (DualSense emulation)
# instead. ds5 is UHID-based, same mechanism as the already-working
# deck-uhid on Mini V2 - no vhci_hcd dependency, so it can't repeat the
# "gamepad disappears" failure. Trying it here on the theory that the
# Start/Select swap is specific to deck-uhid's Steam Deck emulation, not
# the capability map or kernel driver (both confirmed identical to
# ROCKNIX's own, which doesn't have this bug). Unverified on real Flip2
# hardware as of this commit - out for the original reporter to test.
#
# Follow-up (2026-07-23): confirmed working (buttons correct) by the
# reporter, but ds5 loses Deck-specific integration the other devices get
# on deck-uhid. Checked InputPlumber's own source directly (not another
# unverified third-party claim this time - ShadowBlip/InputPlumber,
# src/input/target/steam_deck_uhid.rs + src/drivers/steam_deck/hid_report.rs)
# for a deck-uhid-internal Start/Select bug to fix in place of swapping
# targets - found none: GamepadButton::Start maps to `menu` (hamburger ☰,
# right button) and GamepadButton::Select maps to `options` (overlapping
# squares ⧉, left button), the correct standard Deck-hardware semantic.
# Same capability map and InputPlumber mapping as the working Mini V2 -
# whatever causes the swap on real Flip2 hardware specifically isn't
# visible in any source checked so far. Staying on ds5 (known-working)
# until this can be root-caused with real hardware (evtest capture during
# the swap) instead of guessed at again.
matches:
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Retroid Pocket Flip2

# Only allow a single source device per composite device of this type.
single_source: false

# One or more source devices to combine into a single virtual device. The events
# from these devices will be watched and translated according to the key map.
source_devices:
  - group: gamepad
    evdev:
      phys_path: retroid-pocket-gamepad/input0
      handler: event*
    capability_map_id: retroid_mcu
    # See 01-retroid-controller.yaml's own comment on passthrough - same
    # reason (armada-stick-led's reactive LED mode needs the raw node too).
    passthrough: true

# Optional configuration for the composite device
options:
  auto_manage: true

target_devices:
  - ds5
  - keyboard
