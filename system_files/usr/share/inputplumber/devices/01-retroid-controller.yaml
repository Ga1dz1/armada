# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CompositeDevice

# Name of the composite device mapping
name: Retroid Layout

# Only use this profile if *any* of the given matches matches. If this list is
# empty, then the source devices will *always* be checked. Same gamepad MCU
# across the whole SM8250 Retroid family (confirmed via ROCKNIX's own device
# tree, which ships one identical copy of this file across all of them, not
# per-model). Flip2 is split into its own 01-retroid-flip2-controller.yaml
# instead of being matched here too - see that file for why.
matches:
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Retroid Pocket Mini V2
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Retroid Pocket 5

# Only allow a single source device per composite device of this type.
single_source: false

# One or more source devices to combine into a single virtual device. The events
# from these devices will be watched and translated according to the key map.
source_devices:
  - group: gamepad
    evdev:
      phys_path: retroid-pocket-gamepad/input0
      handler: event*
    capability_map_id: retroid_mcu
    # Without this, InputPlumber grabs/hides the raw device exclusively, so
    # armada-stick-led's "reactive" LED mode (a second, separate reader of
    # this same node) never sees any events. Passthrough leaves the source
    # visible/ungrabbed while InputPlumber still reads and translates it
    # normally for gameplay. This alone made Steam/SDL see the now-visible raw
    # node as a second ("ghost") controller; fixed by dropping the
    # ID_INPUT_JOYSTICK udev tag on it in 70-armada-retroid-gamepad.rules
    # instead of reverting passthrough (InputPlumber doesn't need that tag -
    # see the rule file's comment).
    passthrough: true

# Optional configuration for the composite device
options:
  # If true, InputPlumber will automatically try to manage the input device. If
  # this is false, InputPlumber will not try to manage the device unless an
  # external service enables management of the device. Defaults to 'false'
  auto_manage: true

# The target input device(s) to emulate by default. deck-uhid matches
# armada's own convention for every other device (best native Steam/Proton
# compatibility); users can switch to ds5/xb360 anytime via Settings >
# Controller > Emulation, now that "Retroid Layout" is in controller-type's
# ARMADA_PROFILE_NAMES.
target_devices:
  - deck-uhid
  - keyboard
